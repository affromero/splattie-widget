<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #0e0e14; display: flex; height: 100vh; font-family: monospace; color: #888; }

  .main { flex: 1; display: flex; flex-direction: column; }
  .main > splattie-widget { flex: 1; }

  .panel {
    width: 260px;
    background: #12121a;
    border-left: 1px solid #1e1e2a;
    overflow-y: auto;
    padding: 0.75rem;
    font-size: 0.7rem;
  }

  .states { display: flex; gap: 2px; margin-bottom: 0.75rem; }
  .state-btn {
    flex: 1; padding: 0.35rem; background: #1e1e2a; border: 1px solid #2a2a3a;
    color: #555; font: inherit; cursor: pointer; text-align: center; position: relative;
  }
  .state-btn.editing { color: #7eb8f0; border-color: #7eb8f0; }
  .state-btn.live { box-shadow: 0 0 0 1px #60d080 inset; }
  .state-btn.configured::after {
    content: ''; position: absolute; top: 3px; right: 3px;
    width: 5px; height: 5px; border-radius: 50%; background: #60d080;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0.6rem 0 0.15rem; cursor: pointer; user-select: none;
  }
  .section-header span {
    color: #555; font-size: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .section-header .toggle { color: #444; font-size: 0.7rem; }
  .section-body { overflow: hidden; }
  .section-body.collapsed { display: none; }

  .slider-group { margin: 0.3rem 0; }
  .slider-top { display: flex; align-items: center; justify-content: space-between; }
  .slider-top label { color: #666; font-size: 0.65rem; }
  .slider-top .val-controls {
    display: flex; align-items: center; gap: 3px;
  }
  .slider-top .val {
    color: #7eb8f0; font-size: 0.65rem; min-width: 40px; text-align: right;
    background: #1a1a24; padding: 1px 4px; border-radius: 2px;
  }
  .pm-btn {
    width: 14px; height: 14px; background: #1e1e2a; border: 1px solid #333;
    color: #555; font: 9px monospace; cursor: pointer; line-height: 12px;
    text-align: center; padding: 0; flex-shrink: 0; border-radius: 2px;
  }
  .pm-btn:hover { color: #aaa; border-color: #555; }
  .slider-group input[type=range] {
    width: 100%; accent-color: #7eb8f0; height: 12px; margin-top: 2px;
  }

  .cam-sphere {
    width: 100%; height: 80px; position: relative; margin: 4px 0;
    background: #1a1a24; border-radius: 4px; overflow: hidden; cursor: crosshair;
  }
  .cam-sphere canvas { width: 100%; height: 100%; }
  .cam-sphere-label {
    position: absolute; bottom: 2px; right: 4px; font-size: 0.5rem; color: #444;
  }

  .easing-group { margin: 0.3rem 0; }
  .easing-group label { color: #666; font-size: 0.65rem; }
  .easing-group select {
    width: 100%; margin-top: 2px; background: #1a1a24; border: 1px solid #2a2a3a;
    color: #7eb8f0; font: inherit; font-size: 0.65rem; padding: 2px 4px;
    cursor: pointer;
  }

  .copy-btn {
    width: 100%; padding: 0.3rem; margin-bottom: 0.5rem;
    background: none; border: 1px dashed #2a2a3a;
    color: #555; font: inherit; font-size: 0.6rem; cursor: pointer;
    letter-spacing: 0.03em;
  }
  .copy-btn:hover { color: #7eb8f0; border-color: #7eb8f0; }

  .export-btn {
    width: 100%; margin-top: 1rem; padding: 0.5rem;
    background: #7eb8f0; border: none; color: #0e0e14;
    font: inherit; font-weight: bold; cursor: pointer; font-size: 0.75rem;
  }
  .export-btn:hover { opacity: 0.9; }

  .drop-zone {
    position: absolute; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    background: rgba(10, 10, 15, 0.85);
    border: 3px dashed #7eb8f0; border-radius: 8px; margin: 0.5rem;
  }
  .drop-zone.active { display: flex; }
  .drop-zone span { color: #7eb8f0; font-size: 1rem; pointer-events: none; }

  .upload-btn {
    width: 100%; padding: 0.35rem; margin-bottom: 0.5rem;
    background: none; border: 1px solid #2a2a3a;
    color: #555; font: inherit; font-size: 0.6rem; cursor: pointer;
  }
  .upload-btn:hover { color: #7eb8f0; border-color: #7eb8f0; }
</style></head>
<body>
  <div class="main" id="drop-target">
    <div class="drop-zone" id="drop-zone"><span>Drop .splattie here</span></div>
    <splattie-widget
      id="widget"
      src="/andres.ply"
      bones="/bone_tree.json"
      weights="/lbs_weight_20k.json"
      config="/states.json"
      expression-basis="/expression_basis.bin"
      background="#0e0e14"
    ></splattie-widget>
  </div>

  <div class="panel" id="panel"></div>

  <script type="module">
    import './src/index.ts';
    import * as JSZip from 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm';

    let widget = document.getElementById('widget');
    const panel = document.getElementById('panel');
    const dropTarget = document.getElementById('drop-target');
    const dropZone = document.getElementById('drop-zone');

    let config = null;
    let defaults = null;
    let currentState = 'idle';
    const configured = new Set();
    const collapsed = new Set();

    // Drag and drop .splattie
    dropTarget.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
    dropTarget.addEventListener('dragleave', (e) => { if (e.target === dropTarget || e.target === dropZone) dropZone.classList.remove('active'); });
    dropTarget.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('active');
      const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.splattie'));
      if (file) loadSplattieFile(file);
    });

    function loadSplattieFile(file) {
      const url = URL.createObjectURL(file) + '#.splattie';
      const old = widget;
      const el = document.createElement('splattie-widget');
      el.id = 'widget';
      el.setAttribute('src', url);
      el.setAttribute('background', '#0e0e14');
      el.setAttribute('width', '100%');
      el.setAttribute('height', '100%');
      el.style.flex = '1';
      old.replaceWith(el);
      widget = el;
      widget.addEventListener('splatload', onWidgetLoad, { once: true });
    }

    function onWidgetLoad() {
      const wConfig = widget.config;
      if (wConfig) {
        config = JSON.parse(JSON.stringify(wConfig));
      } else {
        config = { version: 1, defaults: { camera: { theta: 0, phi: 75, radius: 0.5, fov: 60 } },
          states: { idle: {}, hover: {}, click: {} }, transitions: {} };
      }
      defaults = JSON.parse(JSON.stringify(config));
      currentState = Object.keys(config.states)[0] || 'idle';
      configured.clear();
      buildPanel();
      startLiveIndicator();
    }

    function startLiveIndicator() {
      setInterval(() => {
        const live = widget._stateMachine?.activeStateName;
        document.querySelectorAll('.state-btn').forEach(btn => {
          btn.classList.toggle('live', btn.textContent === live);
        });
      }, 200);
    }

    widget.addEventListener('splatload', async () => {
      config = await fetch('/states.json').then(r => r.json());
      defaults = JSON.parse(JSON.stringify(config));
      buildPanel();
      startLiveIndicator();
    });

    function buildPanel() {
      panel.innerHTML = '';

      const uploadBtn = document.createElement('button');
      uploadBtn.className = 'upload-btn';
      uploadBtn.textContent = 'Upload .splattie';
      uploadBtn.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.splattie';
        input.onchange = () => { if (input.files[0]) loadSplattieFile(input.files[0]); };
        input.click();
      };
      panel.appendChild(uploadBtn);

      const statesDiv = document.createElement('div');
      statesDiv.className = 'states';
      const liveState = widget._stateMachine?.activeStateName;
      for (const name of Object.keys(config.states)) {
        const btn = document.createElement('button');
        btn.className = 'state-btn'
          + (name === currentState ? ' editing' : '')
          + (name === liveState ? ' live' : '')
          + (configured.has(name) ? ' configured' : '');
        btn.textContent = name;
        btn.onclick = () => {
          currentState = name;
          buildPanel();
        };
        statesDiv.appendChild(btn);
      }
      panel.appendChild(statesDiv);

      const stateNames = Object.keys(config.states);
      const currentIdx = stateNames.indexOf(currentState);
      const targets = stateNames.slice(currentIdx + 1);
      if (targets.length > 0) {
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = `copy ${currentState} → ${targets.join(', ')}`;
        copyBtn.onclick = () => {
          const src = config.states[currentState];
          for (const name of targets) {
            config.states[name] = JSON.parse(JSON.stringify(src));
            configured.add(name);
          }
          applyConfig();
          buildPanel();
        };
        panel.appendChild(copyBtn);
      }

      const state = config.states[currentState];
      const def = defaults.states[currentState];

      addSection('expression', () => {
        if (!state.expression) state.expression = {};
        if (!def.expression) def.expression = {};
        const d = def.expression;

        const boneKeys = [
          'smile', 'mouthFrown', 'lipPucker', 'jawOpen',
          'browRaiseL', 'browRaiseR', 'browFrownL', 'browFrownR', 'eyeSquint',
          'cheekPuff', 'noseSneer',
          'neckTilt', 'neckYaw', 'neckRoll',
          'gazeX', 'gazeY',
        ];
        const loadedKeys = Object.keys(state.expression).filter(k => !k.startsWith('expr_') && !boneKeys.includes(k));
        const allKeys = [...boneKeys, ...loadedKeys];

        const ranges = { jawOpen: [0, 0.3, 0.005], neckTilt: [-0.3, 0.3, 0.005], neckYaw: [-0.3, 0.3, 0.005],
          neckRoll: [-0.3, 0.3, 0.005], gazeX: [-0.1, 0.1, 0.002], gazeY: [-0.05, 0.05, 0.001] };

        for (const k of allKeys) {
          if (state.expression[k] === undefined) state.expression[k] = d[k] || 0;
          if (d[k] === undefined) d[k] = 0;
          const [min, max, step] = ranges[k] || [0, 1, 0.01];
          addSlider(k, state.expression, k, min, max, step, undefined, d[k]);
        }
      });

      addSection('flame blendshapes', () => {
        if (!state.expression) state.expression = {};
        if (!def.expression) def.expression = {};
        const basis = widget.exprBasis?.basis;
        const labels = basis?.labels ?? [];
        const n = basis?.numExpressions ?? 10;
        for (let i = 0; i < n; i++) {
          const key = labels[i] ?? `expr_${i}`;
          if (state.expression[key] === undefined) state.expression[key] = def.expression[key] || 0;
          if (def.expression[key] === undefined) def.expression[key] = 0;
          addSlider(key, state.expression, key, -2, 2, 0.01, undefined, def.expression[key]);
        }
      });

      addSection('ghost', () => {
        addSlider('amplitude', state.ghost, 'amplitude', 0, 0.02, 0.0005, undefined, def.ghost.amplitude);
        addSlider('frequency', state.ghost, 'frequency', 0, 2, 0.05, undefined, def.ghost.frequency);
        addSlider('wobble', state.ghost, 'wobble', 0, 1, 0.02, undefined, def.ghost.wobble);
      });

      addSection('camera', () => {
        // Camera sphere visual - drag to set theta/phi
        addCameraSphere(state.camera, def.camera);
        addSlider('radius', state.camera, 'radius', 0.1, 3, 0.01, undefined, def.camera.radius);
        addSlider('fov', state.camera, 'fov', 20, 120, 0.5, undefined, def.camera.fov);
      });

      addSection('rotation', () => {
        addSlider('pitch', state, 'rotation', -30, 30, 0.1, 0, def.rotation[0]);
        addSlider('yaw', state, 'rotation', -30, 30, 0.1, 1, def.rotation[1]);
        addSlider('roll', state, 'rotation', -30, 30, 0.1, 2, def.rotation[2]);
      });

      addSection('tracking', () => {
        addSlider('eyes', state.tracking, 'eyes', 0, 1, 0.01, undefined, def.tracking.eyes);
        addSlider('head', state.tracking, 'head', 0, 1, 0.01, undefined, def.tracking.head);
      });

      addSection('transition', () => {
        const transKey = Object.keys(config.transitions).find(k =>
          k.includes('->' + currentState) || k.startsWith('*->' + currentState)
        ) || Object.keys(config.transitions).find(k => k.startsWith('*'));
        if (transKey && config.transitions[transKey]) {
          const t = config.transitions[transKey];
          addSlider('duration', t, 'duration', 0.05, 2, 0.01, undefined, defaults.transitions[transKey]?.duration);
          addEasingSelect(t);
        }
      });

      const exportBtn = document.createElement('button');
      exportBtn.className = 'export-btn';
      exportBtn.textContent = 'Download .splattie';
      exportBtn.onclick = exportSplattie;
      panel.appendChild(exportBtn);
    }

    function addSection(title, buildContent) {
      const header = document.createElement('div');
      header.className = 'section-header';
      const label = document.createElement('span');
      label.textContent = title;
      const toggle = document.createElement('span');
      toggle.className = 'toggle';
      toggle.textContent = collapsed.has(title) ? '▸' : '▾';
      header.appendChild(label);
      header.appendChild(toggle);
      header.onclick = () => {
        if (collapsed.has(title)) collapsed.delete(title);
        else collapsed.add(title);
        buildPanel();
      };
      panel.appendChild(header);

      const body = document.createElement('div');
      body.className = 'section-body' + (collapsed.has(title) ? ' collapsed' : '');
      panel.appendChild(body);

      const prevParent = panel;
      panel._currentBody = body;
      buildContent();
      delete panel._currentBody;
    }

    function getContainer() {
      return panel._currentBody || panel;
    }

    function addCameraSphere(cam, defCam) {
      const wrap = document.createElement('div');
      wrap.className = 'cam-sphere';

      const cvs = document.createElement('canvas');
      cvs.width = 220; cvs.height = 80;
      wrap.appendChild(cvs);

      const lbl = document.createElement('div');
      lbl.className = 'cam-sphere-label';
      wrap.appendChild(lbl);

      function draw() {
        const ctx = cvs.getContext('2d');
        const w = cvs.width, h = cvs.height;
        const cx = w / 2, cy = h / 2;
        const r = Math.min(cx, cy) - 8;

        ctx.clearRect(0, 0, w, h);

        // Draw sphere outline
        ctx.strokeStyle = '#2a2a3a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();

        // Draw grid lines
        ctx.strokeStyle = '#1e1e2a';
        ctx.beginPath();
        ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy);
        ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
        ctx.stroke();

        // Draw camera dot
        const thetaNorm = cam.theta / 90; // -1 to 1
        const phiNorm = (cam.phi - 90) / 90; // -1 to 1 (90=center)
        const dotX = cx + thetaNorm * r;
        const dotY = cy - phiNorm * r;

        ctx.fillStyle = '#7eb8f0';
        ctx.beginPath();
        ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(dotX, dotY, 2, 0, Math.PI * 2);
        ctx.fill();

        lbl.textContent = `θ ${cam.theta.toFixed(0)}° φ ${cam.phi.toFixed(0)}°`;
      }

      let dragging = false;

      function updateFromMouse(e) {
        const rect = cvs.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / rect.width;
        const my = (e.clientY - rect.top) / rect.height;
        cam.theta = (mx - 0.5) * 180;
        cam.phi = (0.5 - my) * 180 + 90;
        cam.theta = Math.max(-90, Math.min(90, cam.theta));
        cam.phi = Math.max(0, Math.min(180, cam.phi));
        configured.add(currentState);
        draw();
        applyConfig();
      }

      cvs.onpointerdown = (e) => { dragging = true; cvs.setPointerCapture(e.pointerId); updateFromMouse(e); };
      cvs.onpointermove = (e) => { if (dragging) updateFromMouse(e); };
      cvs.onpointerup = () => { dragging = false; };
      cvs.ondblclick = () => {
        cam.theta = defCam.theta;
        cam.phi = defCam.phi;
        configured.add(currentState);
        draw();
        applyConfig();
      };

      draw();
      getContainer().appendChild(wrap);
    }

    function addEasingSelect(transObj) {
      const group = document.createElement('div');
      group.className = 'easing-group';
      const lbl = document.createElement('label');
      lbl.textContent = 'easing';
      const sel = document.createElement('select');
      for (const e of ['linear', 'ease-in', 'ease-out', 'ease-in-out', 'snap']) {
        const opt = document.createElement('option');
        opt.value = e; opt.textContent = e;
        if (transObj.easing === e) opt.selected = true;
        sel.appendChild(opt);
      }
      sel.onchange = () => { transObj.easing = sel.value; configured.add(currentState); };
      group.appendChild(lbl);
      group.appendChild(sel);
      getContainer().appendChild(group);
    }

    function addSlider(label, obj, key, min, max, step, arrayIdx, defaultVal) {
      const group = document.createElement('div');
      group.className = 'slider-group';

      const top = document.createElement('div');
      top.className = 'slider-top';

      const lbl = document.createElement('label');
      lbl.textContent = label;

      const controls = document.createElement('div');
      controls.className = 'val-controls';

      const minus = document.createElement('button');
      minus.className = 'pm-btn';
      minus.textContent = '−';

      const val = document.createElement('span');
      val.className = 'val';

      const plus = document.createElement('button');
      plus.className = 'pm-btn';
      plus.textContent = '+';

      controls.appendChild(minus);
      controls.appendChild(val);
      controls.appendChild(plus);

      top.appendChild(lbl);
      top.appendChild(controls);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = min;
      input.max = max;
      input.step = step;

      const fmt = (v) => {
        const n = Number(v);
        if (step < 0.005) return n.toFixed(4);
        if (step < 0.05) return n.toFixed(3);
        if (step < 0.5) return n.toFixed(2);
        return n.toFixed(1);
      };

      const getValue = () => arrayIdx !== undefined ? obj[key][arrayIdx] : obj[key];
      const setValue = (v) => {
        v = Math.max(parseFloat(min), Math.min(parseFloat(max), v));
        if (arrayIdx !== undefined) obj[key][arrayIdx] = v;
        else obj[key] = v;
        configured.add(currentState);
        input.value = v;
        val.textContent = fmt(v);
        applyConfig();
      };

      input.value = getValue();
      val.textContent = fmt(getValue());

      input.oninput = () => setValue(parseFloat(input.value));
      minus.onclick = () => setValue(getValue() - step);
      plus.onclick = () => setValue(getValue() + step);
      input.ondblclick = () => { if (defaultVal !== undefined) setValue(defaultVal); };

      group.appendChild(top);
      group.appendChild(input);
      getContainer().appendChild(group);
    }

    function applyConfig() {
      if (!widget._stateMachine) return;
      widget._stateMachine.updateStates(JSON.parse(JSON.stringify(config.states)));
    }

    async function exportSplattie() {
      const zip = new JSZip.default();
      zip.file('andres.ply', await fetch('/andres.ply').then(r => r.blob()));
      zip.file('bone_tree.json', await fetch('/bone_tree.json').then(r => r.text()));
      zip.file('lbs_weight_20k.json', await fetch('/lbs_weight_20k.json').then(r => r.text()));
      zip.file('states.json', JSON.stringify(config, null, 2));
      const basisRes = await fetch('/expression_basis.bin');
      if (basisRes.ok) zip.file('expression_basis.bin', await basisRes.blob());
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'avatar.splattie';
      a.click();
    }
  </script>
</body>
</html>
